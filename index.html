<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LINE公式アカウントへ移動します</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", "Segoe UI", sans-serif;
            text-align: center;
            padding: 50px 20px;
            background-color: #f9f9f9;
            color: #333;
        }
        .container {
            max-width: 400px;
            margin: 0 auto;
            background: #fff;
            padding: 30px 20px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }
        .btn-line {
            display: block;
            background-color: #06C755; /* LINEのブランドカラー */
            color: #ffffff;
            font-weight: bold;
            text-decoration: none;
            padding: 16px 20px;
            border-radius: 8px;
            font-size: 18px;
            margin-top: 20px;
            box-shadow: 0 4px 6px rgba(6, 199, 85, 0.2);
            transition: background-color 0.3s;
        }
        .btn-line:active {
            background-color: #05b34c;
        }
        .notice {
            margin-top: 24px;
            font-size: 13px;
            color: #d9534f;
            text-align: left;
            background: #fdf2f2;
            padding: 12px;
            border-radius: 6px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>ご登録ありがとうございます</h2>
        <p>以下のボタンをタップして<br>LINEアプリを開いてください。</p>
        
        <a href="https://lin.ee/WLSYnOe" class="btn-line">LINEを開く / 友だち追加</a>

        <div class="notice">
            <strong>※うまく画面が切り替わらない場合※</strong><br>
            右上の「･･･」アイコンをタップし、<strong>「ブラウザで開く（Safari/Chrome）」</strong>を選択してから、再度ボタンを押してください。
        </div>
    </div>
</body>
</html>
