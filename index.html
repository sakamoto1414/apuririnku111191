<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LINEへ移動中...</title>
    <meta http-equiv="refresh" content="1;url=https://lin.ee/WLSYnOe">
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", Arial, sans-serif;
            text-align: center;
            padding: 50px 20px;
            background-color: #f9f9f9;
            color: #333;
        }
        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #06C755;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .btn-line {
            display: inline-block;
            background-color: #06C755;
            color: #ffffff;
            font-weight: bold;
            text-decoration: none;
            padding: 16px 30px;
            border-radius: 8px;
            font-size: 18px;
            margin-top: 30px;
            box-shadow: 0 4px 6px rgba(6, 199, 85, 0.2);
        }
    </style>
</head>
<body>

    <div class="loader"></div>
    <h3>LINEへ移動しています...</h3>
    <p style="font-size: 14px; color: #666;">
        自動で切り替わらない場合は<br>下のボタンをタップしてください。
    </p>

    <a href="https://lin.ee/WLSYnOe" class="btn-line">LINEを開く</a>

    <script>
        // ページ読み込みから0.5秒後に自動でLINEのURLへ遷移させる処理
        window.onload = function() {
            setTimeout(function() {
                window.location.href = "https://lin.ee/WLSYnOe";
            }, 500);
        };
    </script>

</body>
</html>
